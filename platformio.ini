[platformio]
default_envs = esp32s3_16mb_ota
lib_dir = lib_disabled

[env:esp32s3_16mb]
platform = espressif32
board = esp32-s3-devkitc-1-16mb  ; ← кастомный файл
framework = arduino
board_build.partitions = partitions_ota.csv

; Ваши настройки

upload_protocol = esptool
upload_port = COM4 
;upload_port = COM6 
monitor_port = COM4 
;monitor_port = COM6
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    adafruit/RTClib
    madhephaestus/ESP32Encoder
    arduino-libraries/NTPClient 
    PaulStoffregen/Time    # Time library (needed by Timezone)
    JChristensen/Timezone@^1.2.4
    ropg/ezTime@^0.8.3
    bblanchon/ArduinoJson  # Для парсинга JSON ответов от API погоды
    DFRobot/DFRobotDFPlayerMini

lib_ignore =
    dcf77-master

; Скрипт для обновления версии перед компиляцией
extra_scripts = pre:update_version.py

build_unflags =
    -DARDUINO_USB_MODE=1

build_flags = 
    -DVERSION_UPDATED_AT_BUILD=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0

monitor_filters = send_on_enter
monitor_echo = yes

[env:esp32s3_16mb_ota]
extends = env:esp32s3_16mb
upload_protocol = espota
; ВАЖНО: укажите IP адрес устройства в вашей LAN перед OTA-заливкой
upload_port = 192.168.34.8
; Должен совпадать с OTA_PASSWORD в config.h
upload_flags =
    --host_ip=192.168.34.4
    --auth=nixie-ota
extra_scripts =
    pre:update_version.py
    pre:scripts/ota_auto_on.py