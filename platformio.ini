[platformio]
; Быстрая смена метода прошивки:
;   esp32s3_16mb      -> USB
;   esp32s3_16mb_ota  -> OTA
default_envs = ${upload.current_env}
lib_dir = lib_disabled

[upload]
;current_env = esp32s3_16mb
current_env = esp32s3_16mb_ota

[env:esp32s3_16mb]
platform = espressif32
board = esp32-s3-devkitc-1-16mb  ; ← кастомный файл
framework = arduino
board_build.partitions = partitions_ota.csv
board_build.filesystem = spiffs

; Ваши настройки

; Оставлено автодетектирование порта для нового чипа по USB-CDC.
; При необходимости можно явно задать порт:
upload_protocol = esptool
upload_port = COM7
monitor_port = COM9
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    adafruit/RTClib
    madhephaestus/ESP32Encoder
    arduino-libraries/NTPClient 
    PaulStoffregen/Time    # Time library (needed by Timezone)
    JChristensen/Timezone@^1.2.4
    ropg/ezTime@^0.8.3
    bblanchon/ArduinoJson  # Для парсинга JSON ответов от API погоды

lib_ignore =
    dcf77-master

; Скрипт для обновления версии перед компиляцией
; После обычной USB-прошивки автоматически заливаем SPIFFS из папки data/
extra_scripts =
    pre:update_version.py
    post:scripts/auto_upload_fs.py

build_unflags =
    -DARDUINO_USB_MODE=1

build_flags = 
    -DVERSION_UPDATED_AT_BUILD=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0

monitor_filters = send_on_enter
monitor_echo = yes

[env:esp32s3_16mb_ota]
extends = env:esp32s3_16mb
upload_protocol = espota
; Временно отключено: post-upload заливка SPIFFS после OTA upload
ota_upload_fs = false
; OTA по mDNS hostname (должен совпадать с ArduinoOTA.setHostname)
upload_port = Clockio-OTA.local
; monitor_port используется скриптом ota_auto_on.py для отправки команды "ota on"
; Перед OTA-заливкой закройте Serial Monitor, чтобы COM-порт не был занят
; Должен совпадать с OTA_PASSWORD в config.h
upload_flags =
    ; --host_ip=192.168.34.4  ; лучше не фиксировать, чтобы PlatformIO выбрал корректный интерфейс
    --timeout=10
    --auth=Gujenov-LAB-OTA
extra_scripts =
    pre:update_version.py
    pre:scripts/ota_auto_on.py
    post:scripts/auto_upload_fs.py
